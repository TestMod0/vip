<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIP Member Feedback</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@400;500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #1a1a1a; --ink2: #3d3d3d; --ink3: #777; --ink4: #aaa;
  --line: #e8e8e8; --line2: #f0f0f0; --bg: #fafaf8; --card: #ffffff;
  --green: #1a6644; --green-bg: #f0f7f3; --red: #8b2020; --red-bg: #fdf2f2;
  --amber: #7a4f00; --amber-bg: #fdf8ed; --blue: #1a3d6b; --blue-bg: #f0f4fb; --r: 10px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 14px; scroll-behavior: smooth; }
body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--ink); min-height: 100vh; }
::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-thumb { background: var(--line); border-radius: 99px; }

/* INDEX */
#index-page { max-width: 780px; margin: 0 auto; padding: 48px 24px 80px; }
.site-header { margin-bottom: 40px; padding-bottom: 24px; border-bottom: 1px solid var(--line); display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; }
.site-title { font-family: 'Instrument Serif', serif; font-size: 28px; font-weight: 400; letter-spacing: -0.3px; }
.site-title span { color: var(--ink3); }
.site-sub { font-size: 12px; color: var(--ink4); margin-top: 4px; font-family: 'DM Mono', monospace; }
.sync-area { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; flex-shrink: 0; }
.sync-btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: 8px; font-size: 12px; font-weight: 500; cursor: pointer; border: 1px solid var(--line); background: var(--card); color: var(--ink2); font-family: 'Inter', sans-serif; transition: all 0.15s; white-space: nowrap; }
.sync-btn:hover { border-color: var(--ink3); background: var(--line2); }
.sync-btn.syncing { opacity: 0.6; pointer-events: none; }
.sync-status { font-size: 10px; color: var(--ink4); font-family: 'DM Mono', monospace; text-align: right; }
.sync-status.ok { color: var(--green); }
.sync-status.err { color: var(--red); }

.search-bar { position: relative; margin-bottom: 24px; }
.search-bar input { width: 100%; padding: 12px 16px 12px 40px; border: 1px solid var(--line); border-radius: var(--r); background: var(--card); font-size: 13px; font-family: 'Inter', sans-serif; color: var(--ink); outline: none; transition: border-color 0.15s; }
.search-bar input:focus { border-color: var(--ink); }
.search-bar input::placeholder { color: var(--ink4); }
.search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--ink4); font-size: 15px; pointer-events: none; }

.filter-row { display: flex; gap: 6px; margin-bottom: 20px; flex-wrap: wrap; }
.chip { padding: 5px 14px; border-radius: 99px; font-size: 11px; font-weight: 500; border: 1px solid var(--line); color: var(--ink3); cursor: pointer; background: var(--card); transition: all 0.12s; font-family: 'Inter', sans-serif; }
.chip:hover { border-color: var(--ink3); color: var(--ink); }
.chip.on { background: var(--ink); border-color: var(--ink); color: #fff; }

.member-grid { display: flex; flex-direction: column; gap: 8px; }
.member-row { background: var(--card); border: 1px solid var(--line); border-radius: var(--r); padding: 16px 18px; transition: all 0.12s; display: flex; align-items: center; gap: 16px; color: inherit; }
.member-row:hover { border-color: var(--ink3); box-shadow: 0 2px 8px rgba(0,0,0,0.06); transform: translateY(-1px); }
.member-row.has-feedback { border-left: 3px solid var(--ink); }
.member-avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--line2); border: 1px solid var(--line); display: flex; align-items: center; justify-content: center; font-family: 'Instrument Serif', serif; font-size: 15px; color: var(--ink2); flex-shrink: 0; }
.member-info { flex: 1; min-width: 0; }
.member-name { font-weight: 500; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.member-meta { font-size: 11px; color: var(--ink4); font-family: 'DM Mono', monospace; margin-top: 2px; }
.member-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.tier-tag { font-size: 9px; font-weight: 600; padding: 2px 7px; border-radius: 99px; letter-spacing: 0.5px; font-family: 'DM Mono', monospace; }
.t-diamond { background: #f3f0ff; color: #6c4ee0; }
.t-gold { background: #fdf8ed; color: #7a4f00; }
.t-silver { background: #f0f4fb; color: #1a3d6b; }
.t-risk { background: #fdf2f2; color: #8b2020; }
.feedback-count { font-size: 10px; color: var(--ink4); font-family: 'DM Mono', monospace; }
.has-badge { background: var(--ink); color: #fff; font-size: 9px; font-weight: 600; padding: 2px 6px; border-radius: 99px; font-family: 'DM Mono', monospace; }
.no-members { text-align: center; padding: 40px; color: var(--ink4); font-size: 13px; }
.copy-link-btn { display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; border-radius: 6px; font-size: 10px; font-weight: 500; border: 1px solid var(--line); background: var(--card); color: var(--ink3); cursor: pointer; font-family: 'DM Mono', monospace; transition: all 0.12s; white-space: nowrap; flex-shrink: 0; }
.copy-link-btn:hover { border-color: var(--ink3); color: var(--ink); background: var(--line2); }

/* PROFILE */
#profile-page { display: none; max-width: 720px; margin: 0 auto; padding: 32px 24px 80px; }
.back-link { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; color: var(--ink3); text-decoration: none; margin-bottom: 28px; transition: color 0.12s; cursor: pointer; }
.back-link:hover { color: var(--ink); }
.profile-hero { border: 1px solid var(--line); border-radius: 14px; overflow: hidden; margin-bottom: 24px; }
.hero-top { padding: 24px 28px; border-bottom: 1px solid var(--line); display: flex; align-items: flex-start; gap: 18px; }
.hero-avatar { width: 56px; height: 56px; border-radius: 50%; border: 1px solid var(--line); background: var(--line2); display: flex; align-items: center; justify-content: center; font-family: 'Instrument Serif', serif; font-size: 20px; color: var(--ink2); flex-shrink: 0; }
.hero-name { font-family: 'Instrument Serif', serif; font-size: 24px; font-weight: 400; line-height: 1.15; margin-bottom: 4px; }
.hero-sub { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--ink3); margin-bottom: 10px; }
.hero-tags { display: flex; gap: 6px; flex-wrap: wrap; }
.hero-actions { margin-left: auto; display: flex; gap: 6px; flex-shrink: 0; }
.btn { display: inline-flex; align-items: center; gap: 5px; padding: 7px 14px; border-radius: 7px; font-size: 12px; font-weight: 500; cursor: pointer; border: 1px solid var(--line); background: var(--card); color: var(--ink2); font-family: 'Inter', sans-serif; transition: all 0.12s; white-space: nowrap; }
.btn:hover { border-color: var(--ink3); }
.btn.primary { background: var(--ink); border-color: var(--ink); color: #fff; }
.btn.primary:hover { opacity: 0.85; }
.btn.ghost { background: transparent; border-color: var(--line); color: var(--ink3); font-size: 11px; padding: 5px 10px; }
.hero-metrics { display: grid; grid-template-columns: repeat(4,1fr); }
.metric-cell { padding: 16px 20px; border-right: 1px solid var(--line); }
.metric-cell:last-child { border-right: none; }
.metric-label { font-size: 10px; color: var(--ink4); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 5px; font-family: 'DM Mono', monospace; }
.metric-value { font-family: 'DM Mono', monospace; font-size: 16px; font-weight: 500; }
.mv-green { color: var(--green); } .mv-red { color: var(--red); } .mv-blue { color: var(--blue); }

/* 90d stats panel */
.stats-90d { border: 1px solid var(--line); border-radius: var(--r); overflow: hidden; margin-bottom: 20px; }
.stats-90d-head { padding: 10px 16px; background: var(--line2); border-bottom: 1px solid var(--line); font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; color: var(--ink3); font-family: 'DM Mono', monospace; display: flex; justify-content: space-between; align-items: center; cursor: pointer; user-select: none; }
.stats-90d-body { display: grid; grid-template-columns: repeat(3,1fr); gap: 0; }
.stat-cell { padding: 12px 16px; border-right: 1px solid var(--line); border-bottom: 1px solid var(--line); }
.stat-cell:nth-child(3n) { border-right: none; }
.stat-cell:nth-last-child(-n+3) { border-bottom: none; }
.stat-lbl { font-size: 9px; color: var(--ink4); text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 3px; font-family: 'DM Mono', monospace; }
.stat-val { font-size: 12px; font-weight: 600; font-family: 'DM Mono', monospace; }

/* Sections */
.section { margin-bottom: 20px; }
.section-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.section-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; color: var(--ink3); font-family: 'DM Mono', monospace; }

/* Log tabs */
.log-tabs { display: flex; gap: 0; border: 1px solid var(--line); border-radius: var(--r); overflow: hidden; margin-bottom: 14px; }
.log-tab { flex: 1; padding: 9px 14px; font-size: 12px; font-weight: 500; font-family: 'Inter', sans-serif; cursor: pointer; background: var(--card); color: var(--ink3); border: none; border-right: 1px solid var(--line); transition: all 0.12s; text-align: center; }
.log-tab:last-child { border-right: none; }
.log-tab:hover { background: var(--line2); color: var(--ink); }
.log-tab.active { background: var(--ink); color: #fff; }
.log-tab.active-gift { background: #5b3d99; color: #fff; }

/* Feedback cards */
.feedback-card { border: 1px solid var(--line); border-radius: var(--r); overflow: hidden; margin-bottom: 10px; }
.feedback-card-head { padding: 12px 16px; border-bottom: 1px solid var(--line2); display: flex; align-items: center; gap: 10px; background: var(--line2); }
.contact-type { font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 99px; font-family: 'DM Mono', monospace; }
.ct-call { background: var(--blue-bg); color: var(--blue); }
.ct-wa { background: var(--green-bg); color: var(--green); }
.ct-note { background: var(--amber-bg); color: var(--amber); }
.ct-gifts { background: #f5f0ff; color: #5b3d99; }
.ct-tg { background: #e8f4fd; color: #0070ba; }
.feedback-date { font-size: 11px; color: var(--ink4); font-family: 'DM Mono', monospace; margin-left: auto; }
.feedback-body { padding: 16px; }
.feedback-text { font-size: 13px; line-height: 1.75; color: var(--ink2); white-space: pre-wrap; }
.feedback-footer { padding: 10px 16px; border-top: 1px solid var(--line2); display: flex; gap: 16px; background: var(--line2); }
.feedback-footer span { font-size: 11px; color: var(--ink3); font-family: 'DM Mono', monospace; }
.feedback-footer strong { color: var(--ink); font-weight: 500; }
.delete-entry-btn { display: inline-flex; align-items: center; gap: 3px; padding: 3px 8px; border-radius: 5px; font-size: 10px; border: 1px solid transparent; background: transparent; color: var(--ink4); cursor: pointer; font-family: 'DM Mono', monospace; transition: all 0.12s; }
.delete-entry-btn:hover { border-color: var(--red); color: var(--red); background: var(--red-bg); }
.edit-gift-btn { display: inline-flex; align-items: center; gap: 3px; padding: 3px 8px; border-radius: 5px; font-size: 10px; border: 1px solid transparent; background: transparent; color: var(--ink4); cursor: pointer; font-family: 'DM Mono', monospace; transition: all 0.12s; }
.edit-gift-btn:hover { border-color: var(--ink3); color: var(--ink2); background: var(--line2); }
.gift-edit-inline { display: flex; gap: 6px; align-items: center; margin-top: 4px; }
.gift-edit-inline input { flex: 1; background: var(--line2); border: 1px solid var(--ink3); border-radius: 5px; padding: 4px 8px; font-size: 12px; font-family: 'DM Mono', monospace; color: var(--ink); outline: none; }
.gift-edit-inline .save-gift-btn { padding: 4px 10px; border-radius: 5px; font-size: 11px; font-weight: 500; border: 1px solid var(--ink); background: var(--ink); color: #fff; cursor: pointer; font-family: 'Inter', sans-serif; }
.gift-edit-inline .cancel-gift-btn { padding: 4px 8px; border-radius: 5px; font-size: 11px; border: 1px solid var(--line); background: transparent; color: var(--ink3); cursor: pointer; font-family: 'Inter', sans-serif; }

/* Add note form */
.add-note-box { border: 1px dashed var(--line); border-radius: var(--r); padding: 16px; background: var(--card); }
.add-note-box textarea { width: 100%; min-height: 80px; background: var(--line2); border: 1px solid var(--line); border-radius: 7px; padding: 10px 12px; font-size: 13px; font-family: 'Inter', sans-serif; color: var(--ink); resize: vertical; outline: none; line-height: 1.6; transition: border-color 0.15s; }
.add-note-box textarea:focus { border-color: var(--ink3); }
.add-note-box textarea::placeholder { color: var(--ink4); }
.note-form-row { display: flex; gap: 8px; margin-top: 8px; align-items: center; flex-wrap: wrap; }
.note-form-row select, .note-form-row input[type=date] { background: var(--line2); border: 1px solid var(--line); border-radius: 6px; padding: 6px 10px; font-size: 12px; font-family: 'Inter', sans-serif; color: var(--ink2); outline: none; }
.note-form-row .spacer { flex: 1; }

/* Gift add form */
.gift-add-box { border: 1px dashed #c4b5d9; border-radius: var(--r); padding: 16px; background: #fdf9ff; }
.gift-add-box textarea { width: 100%; min-height: 70px; background: var(--line2); border: 1px solid var(--line); border-radius: 7px; padding: 10px 12px; font-size: 13px; font-family: 'Inter', sans-serif; color: var(--ink); resize: vertical; outline: none; line-height: 1.6; }

/* Prefs */
.pref-grid { display: flex; flex-wrap: wrap; gap: 6px; }
.pref-pill { padding: 5px 12px; border-radius: 99px; font-size: 11px; font-weight: 500; border: 1px solid var(--line); color: var(--ink3); cursor: pointer; transition: all 0.12s; }
.pref-pill:hover { border-color: var(--ink3); }
.pref-pill.on { background: var(--ink); border-color: var(--ink); color: #fff; }

/* Formula box */
.formula-box { background: var(--ink); border-radius: var(--r); padding: 16px 20px; }
.formula-label { font-size: 10px; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 0.5px; font-family: 'DM Mono', monospace; margin-bottom: 8px; }
.formula-code { font-family: 'DM Mono', monospace; font-size: 12px; color: #c8f060; word-break: break-all; cursor: pointer; }
.formula-hint { font-size: 11px; color: rgba(255,255,255,0.35); margin-top: 6px; }

/* Toast */
#toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--ink); color: #fff; padding: 10px 20px; border-radius: 99px; font-size: 12px; font-family: 'Inter', sans-serif; opacity: 0; transition: opacity 0.2s; pointer-events: none; z-index: 999; white-space: nowrap; }
#toast.show { opacity: 1; }
.empty-fb { text-align: center; padding: 24px; color: var(--ink4); font-size: 12px; border: 1px dashed var(--line); border-radius: var(--r); }
.divider { height: 1px; background: var(--line); margin: 20px 0; }
</style>
</head>

</div>

const STORE_KEY = 'vip_feedback_v1';
const MEMBERS_KEY = 'vip_members_v1';
let store = {};

async function loadStore() {
  // Load members from localStorage cache first (fast)
  try {
    const saved = JSON.parse(localStorage.getItem(MEMBERS_KEY));
    if (saved && saved.length) {
      MEMBERS = saved;
      const ts = localStorage.getItem(MEMBERS_KEY + '_ts');
      if (ts) {
        const el = document.getElementById('sync-status');
        if (el) { el.textContent = 'Last synced: ' + ts; el.className = 'sync-status ok'; }
      }
    }
  } catch {}

  // Load feedback from Firebase
  try {
    await initFirebase();

    // Always try loading members from Firebase — overrides hardcoded defaults
    try {
      const membersDoc = await db.collection('config').doc('members').get();
      if (membersDoc.exists && membersDoc.data().list && membersDoc.data().list.length) {
        MEMBERS = membersDoc.data().list;
        localStorage.setItem(MEMBERS_KEY, JSON.stringify(MEMBERS));
        localStorage.setItem(MEMBERS_KEY + '_ts', membersDoc.data().ts || '');
        const el = document.getElementById('sync-status');
        if (el) { el.textContent = 'Members loaded · ' + (membersDoc.data().ts||''); el.className = 'sync-status ok'; }
      }
    } catch(e) { console.warn('Members load from Firebase failed:', e); }
    const snapshot = await db.collection('feedback').get();
    store = {};
    snapshot.forEach(doc => { store[doc.id] = doc.data(); });

    // Seed only if no data exists for those members
    for (const [id, seed] of Object.entries(SEED_FEEDBACK)) {
      if (!store[id]) {
        store[id] = { prefs: seed.prefs||[], notes: seed.notes||'', entries: seed.entries||[], _seeded: true };
        await db.collection('feedback').doc(id).set(store[id]);
      }
    }
  } catch(e) {
    // Fallback to localStorage if Firebase fails
    console.warn('Firebase load failed, using localStorage:', e);
    try { store = JSON.parse(localStorage.getItem(STORE_KEY)) || {}; } catch { store = {}; }
    for (const [id, seed] of Object.entries(SEED_FEEDBACK)) {
      if (!store[id]) { store[id] = { prefs: seed.prefs||[], notes: seed.notes||'', entries: seed.entries||[], _seeded: true }; }
    }
  }
}

async function saveStore(id) {
  // Save specific member to Firebase
  try {
    await initFirebase();
    await db.collection('feedback').doc(id).set(store[id]);
  } catch(e) {
    console.warn('Firebase save failed, using localStorage:', e);
  }
  // Always cache locally too
  localStorage.setItem(STORE_KEY, JSON.stringify(store));
}

function getMember(id) {
  if (!store[id]) store[id] = { prefs: [], notes: '', entries: [], _seeded: false };
  return store[id];
}

function parseNum(s) {
  if (!s || s === '' || s === '#DIV/0!') return 0;
  return parseFloat(String(s).replace(/[,%]/g, '')) || 0;
}

function parseDate(s) {
  if (!s) return '';
  // Handle "2021-07-24 16:24:44" → "2021-07-24"
  return String(s).slice(0, 10);
}

function parseCSV(text) {
  const rows = [];
  let cur = '', inQ = false, row = [];
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (c === '"') { if (inQ && text[i+1] === '"') { cur += '"'; i++; } else inQ = !inQ; }
    else if (c === ',' && !inQ) { row.push(cur); cur = ''; }
    else if ((c === '\n' || c === '\r') && !inQ) {
      if (c === '\r' && text[i+1] === '\n') i++;
      row.push(cur); cur = ''; rows.push(row); row = [];
    } else cur += c;
  }
  if (cur || row.length) { row.push(cur); rows.push(row); }
  return rows;
}

async function syncFromSheet() {
  const btn = document.querySelector('.sync-btn');
  const statusEl = document.getElementById('sync-status');
  btn.classList.add('syncing');
  btn.textContent = '⟳ Syncing…';
  statusEl.textContent = 'Fetching…';
  statusEl.className = 'sync-status';

  const url = 'https://docs.google.com/spreadsheets/d/' + SHEET_ID + '/gviz/tq?tqx=out:csv&sheet=' + encodeURIComponent(SHEET_NAME);

  try {
    const resp = await fetch(url);
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const text = await resp.text();
    const rows = parseCSV(text);

    // Skip header rows — find first row where col C looks like "BOT..."
    const dataRows = rows.filter(r => r[2] && String(r[2]).trim().startsWith('BOT'));

    if (!dataRows.length) throw new Error('No member rows found. Check sheet sharing settings.');

    const newMembers = dataRows.map(r => {
      // Columns (0-indexed):
      // A=0 Region, B=1 Brand, C=2 MemberID, D=3 Name, E=4 Phone, F=5 Level, G=6 Tier
      // H=7 TotalDeposit, I=8 TotalWithdrawal, J=9 Nett, K=10 LoseRate
      // L=11 DateJoined, M=12 LastDep
      // N=13 DepositMonth(NOW), O=14 Loss(NOW)
      // P=15 (blank), Q=16 Month1Dep, R=17 Month2Dep, S=18 Month3Dep
      // T=19 (blank), U=20 AvgDeposit
      // V=21 (blank), W=22 Month1Loss, X=23 Month2Loss, Y=24 Month3Loss
      // Z=25 AvgMonthlyLoss, AA=26 PeakMonthlyLoss, AB=27 MostPlayed, AC=28(blank), AD=29 MemberFeedback
      const loseRateRaw = parseNum(r[10]);
      const dep = parseNum(r[7]);
      const nett = parseNum(r[9]);
      const region = String(r[0]||'').trim();
      let status = 'active';
      const lastDep = parseDate(r[12]);
      if (lastDep) {
        const daysSince = (Date.now() - new Date(lastDep)) / 86400000;
        if (daysSince > 180) status = 'dormant';
        else if (daysSince > 60) status = 'inactive';
      }
      // Find existing member to preserve 90d data
      const existing = MEMBERS.find(x => x.id === String(r[2]).trim()) || {};
      return {
        id: String(r[2]).trim(),
        name: String(r[3]||'').trim(),
        phone: String(r[4]||'').trim(),
        region: region,
        brand: String(r[1]||'').trim(),
        level: parseInt(r[5]) || 11,
        tier: String(r[6]||'').trim(),
        deposit: dep,
        withdrawal: parseNum(r[8]),
        nett: nett,
        loseRate: loseRateRaw,
        joined: parseDate(r[11]),
        lastDep: lastDep,
        status: status,
        mostPlayed: String(r[27]||'').trim() || existing.mostPlayed || '',
        // Preserve existing 90d data — only sync updates basic member info
        depMonth: existing.depMonth || 0,
        lossNow: existing.lossNow || 0,
        dep90m1: existing.dep90m1 || 0,
        dep90m2: existing.dep90m2 || 0,
        dep90m3: existing.dep90m3 || 0,
        avgDep90: existing.avgDep90 || 0,
        loss90m1: existing.loss90m1 || 0,
        loss90m2: existing.loss90m2 || 0,
        loss90m3: existing.loss90m3 || 0,
        avgLoss90: existing.avgLoss90 || 0,
        peakLoss90: existing.peakLoss90 || 0,
      };
    }).filter(m => m.id);

    MEMBERS = newMembers;
    const ts = new Date().toLocaleString('en-GB', {day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});
    localStorage.setItem(MEMBERS_KEY, JSON.stringify(MEMBERS));
    localStorage.setItem(MEMBERS_KEY + '_ts', ts);

    // Push members to Firebase so staff can see them
    try {
      await initFirebase();
      await db.collection('config').doc('members').set({ list: MEMBERS, ts: ts });
    } catch(e) { console.warn('Firebase members push failed:', e); }

    statusEl.textContent = 'Synced ' + MEMBERS.length + ' members · ' + ts;
    statusEl.className = 'sync-status ok';
    toast('Synced ' + MEMBERS.length + ' members from sheet ✓');
    renderIndex();
    if (currentId) renderProfile(currentId);
  } catch(e) {
    statusEl.textContent = 'Sync failed: ' + e.message;
    statusEl.className = 'sync-status err';
    toast('Sync failed: ' + e.message);
  }

  btn.classList.remove('syncing');
  btn.textContent = '⟳ Sync from Sheet';
}

function getTier(m) {
  if (m.deposit >= 800000) return 'diamond';
  if (m.deposit >= 200000) return 'gold';
  if (m.deposit >= 80000) return 'silver';
  return 'risk';
}
function tierTag(t) {
  const map = { diamond:['DIAMOND','t-diamond'], gold:['GOLD','t-gold'], silver:['SILVER','t-silver'], risk:['AT-RISK','t-risk'] };
  const [label, cls] = map[t] || ['—',''];
  return '<span class="tier-tag ' + cls + '">' + label + '</span>';
}
function statusTag(s) {
  const map = { active:['ACTIVE','mv-green'], dormant:['DORMANT',''], inactive:['INACTIVE','mv-red'] };
  const [label, cls] = map[s] || [String(s).toUpperCase(),''];
  return '<span class="tier-tag" style="background:var(--line2);color:var(--ink3)">' + label + '</span>';
}
function fmtNum(n) { return Math.abs(Math.round(n)).toLocaleString(); }
function fmtDate(s) {
  if (!s) return '—';
  try { return new Date(s).toLocaleDateString('en-GB', {day:'2-digit',month:'short',year:'numeric'}); } catch { return s; }
}
function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function initials(m) {
  if (m.name) return m.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
  return m.id.slice(3,5);
}
function fmtMoney(n, curr) {
  if (!n) return '—';
  const sign = n < 0 ? '-' : '';
  return sign + curr + ' ' + fmtNum(Math.abs(n));
}

function build90dHtml(m, curr) {
  function sc(n) {
    if (!n) return '<span style="color:var(--ink4)">—</span>';
    const neg = n < 0;
    // Positive = customer lost (red), Negative = customer won (green)
    return '<span class="' + (neg?'mv-green':'mv-red') + '">' + (neg?'+':'-') + curr + ' ' + fmtNum(Math.abs(n)) + '</span>';
  }
  function sp(n) { return n ? curr + ' ' + fmtNum(n) : '<span style="color:var(--ink4)">—</span>'; }
  const cells = [
    ['Deposit this month', sp(m.depMonth)],
    ['Loss this month', sc(m.lossNow)],
    ['Most played', esc(m.mostPlayed) || '—'],
    ['Dep 3 months ago', sp(m.dep90m1)],
    ['Dep 2 months ago', sp(m.dep90m2)],
    ['Dep last month', sp(m.dep90m3)],
    ['Loss 3 months ago', sc(m.loss90m1)],
    ['Loss 2 months ago', sc(m.loss90m2)],
    ['Loss last month', sc(m.loss90m3)],
    ['Avg deposit (90d)', sp(m.avgDep90)],
    ['Avg loss (90d)', sc(m.avgLoss90)],
    ['Total loss (90d)', sc(m.peakLoss90)],
  ];
  return '<div class="stats-90d">'
    + '<div class="stats-90d-head" onclick="toggle90d(this)"><span>📊 Last 90 Days</span><span id="toggle90d-arrow">▲</span></div>'

// ─────────────────────────────────────────────
async function addEntry(id) {
  const text = document.getElementById('new-note-'+id).value.trim();
  if (!text) return toast('Please type something first');
  const d = getMember(id);
  d.entries.push({
    type: document.getElementById('new-type-'+id).value,
    date: document.getElementById('new-date-'+id).value,
    text, reward: document.getElementById('new-reward-'+id).value.trim(), followup: ''
  });
  await saveStore(id); toast('Log saved ✓'); renderProfile(id);
}

async function addGiftEntry(id) {
  const text = document.getElementById('new-note-'+id).value.trim();
  if (!text) return toast('Please describe the gift first');
  const d = getMember(id);
  d.entries.push({
    type: 'gifts',
    date: document.getElementById('new-date-'+id).value,
    text, reward: document.getElementById('new-reward-'+id).value.trim(), followup: ''
  });
  await saveStore(id); toast('Gift record saved ✓'); renderProfile(id);
}

async function saveNotes(id) {
  const d = getMember(id);
  d.notes = document.getElementById('notes-'+id).value;
  await saveStore(id); toast('Notes saved ✓');
  const ta = document.getElementById('notes-'+id);
  if (ta) { ta.style.borderColor = '#1a6644'; setTimeout(()=>ta.style.borderColor='',1200); }
}

async function savePrefs(id) {
  const d = getMember(id);
  d.prefs = Array.from(document.querySelectorAll('#prefs-'+id+' .pref-pill.on')).map(e=>e.textContent.trim());
  await saveStore(id); toast('Preferences saved ✓');
}

function togglePref(id, pref, el) { el.classList.toggle('on'); }

async function deleteEntry(id, realIdx) {
  if (!confirm('Delete this log entry? This cannot be undone.')) return;
  const d = getMember(id);
  d.entries.splice(realIdx, 1);
  await saveStore(id); toast('Log deleted'); renderProfile(id);
}

function showGiftEdit(id, realIdx, entryId) {
  document.getElementById('gift-edit-'+entryId).style.display = 'block';
  document.getElementById('egb-'+entryId).style.display = 'none';
  const input = document.getElementById('gi-'+entryId);
  if (input) { input.focus(); input.select(); }
}
function hideGiftEdit(entryId) {
  document.getElementById('gift-edit-'+entryId).style.display = 'none';
  document.getElementById('egb-'+entryId).style.display = '';
}
async function saveGift(id, realIdx, entryId) {
  const val = document.getElementById('gi-'+entryId).value.trim();
  const d = getMember(id);
  d.entries[realIdx].reward = val;
  await saveStore(id); toast('Gift updated ✓'); renderProfile(id);
}

// ─────────────────────────────────────────────
// EXCEL 90D PROCESSING (SheetJS)
// ─────────────────────────────────────────────
function loadSheetJS() {
  return new Promise((resolve) => {
    if (window.XLSX) { resolve(); return; }
    const s = document.createElement('script');
    s.src = 'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
    s.onload = resolve;
    document.head.appendChild(s);
  });
}

async function processExcelFiles() {
  const depFile = document.getElementById('dep-file').files[0];
  const wdFile = document.getElementById('wd-file').files[0];
  const statusEl = document.getElementById('excel-status');

  if (!depFile || !wdFile) { statusEl.textContent = '⚠️ Please select both files'; return; }

  statusEl.textContent = 'Loading SheetJS…';
  await loadSheetJS();

  statusEl.textContent = 'Reading files…';

  function readXlsx(file) {
    return new Promise((resolve) => {
      const reader = new FileReader();
      reader.onload = (e) => {
        const wb = XLSX.read(e.target.result, { type: 'array' });
        const ws = wb.Sheets[wb.SheetNames[0]];
        resolve(XLSX.utils.sheet_to_json(ws));
      };
      reader.readAsArrayBuffer(file);
    });
  }

  const depData = await readXlsx(depFile);
  const wdData = await readXlsx(wdFile);

  // Parse dates and group by member + month
  function getMonth(row) {
    const d = new Date(row['Created Date Time'] || row['Approved Date Time'] || '');
    if (isNaN(d)) return null;
    return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
  }

  // Find the 3 most recent months in data
  const allMonths = [...new Set(depData.map(getMonth).filter(Boolean))].sort();
  const months = allMonths.slice(-3); // last 3 months
  if (months.length < 3) { statusEl.textContent = '⚠️ Need at least 3 months of data'; return; }

  statusEl.textContent = 'Calculating for months: ' + months.join(', ') + '…';

  const updated = MEMBERS.map(m => {
    const mDep = depData.filter(r => r['Member ID'] === m.id);
    const mWd = wdData.filter(r => r['Member ID'] === m.id);

    const depByMonth = months.map(mo => mDep.filter(r => getMonth(r)===mo).reduce((s,r)=>{
      const amt = parseFloat(String(r['Amount']||0).replace(/,/g,'')) || 0;
      return s + amt;
    }, 0));
    const wdByMonth = months.map(mo => mWd.filter(r => getMonth(r)===mo).reduce((s,r)=>{
      const amt = parseFloat(String(r['Amount']||0).replace(/,/g,'')) || 0;
      return s + amt;
    }, 0));
    const lossByMonth = depByMonth.map((d,i) => d - wdByMonth[i]);

    const avgDep  = depByMonth.reduce((a,b)=>a+b,0) / 3;
    const avgLoss = lossByMonth.reduce((a,b)=>a+b,0) / 3;
    const totalLoss = lossByMonth.reduce((a,b)=>a+b,0);

    return {
      ...m,
      dep90m1: Math.round(depByMonth[0]*100)/100,
      dep90m2: Math.round(depByMonth[1]*100)/100,
      dep90m3: Math.round(depByMonth[2]*100)/100,
      avgDep90: Math.round(avgDep*100)/100,
      loss90m1: Math.round(lossByMonth[0]*100)/100,
      loss90m2: Math.round(lossByMonth[1]*100)/100,
      loss90m3: Math.round(lossByMonth[2]*100)/100,
      avgLoss90: Math.round(avgLoss*100)/100,
      peakLoss90: Math.round(totalLoss*100)/100,
    };
  });

  MEMBERS = updated;
  const ts = new Date().toLocaleString('en-GB', {day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});
  localStorage.setItem(MEMBERS_KEY, JSON.stringify(MEMBERS));
  localStorage.setItem(MEMBERS_KEY + '_ts', ts);

  // Push to Firebase so staff sees updated data
  try {
    await initFirebase();
    await db.collection('config').doc('members').set({ list: MEMBERS, ts: ts });
    statusEl.style.color = 'var(--green)';
    statusEl.textContent = '✅ 90d data updated & saved to cloud for ' + MEMBERS.length + ' members';
  } catch(e) {
    statusEl.textContent = '✅ Calculated locally (Firebase save failed)';
  }

  renderIndex();
  if (currentId) renderProfile(currentId);
}

function copyMemberLink(id) {
  const m = MEMBERS.find(x => x.id === id);
  const name = m ? (m.name || m.id) : id;
  const link = 'https://testmod0.github.io/vip/#' + id;
  const formula = '=HYPERLINK("' + link + '","📋 ' + name + '")';
  navigator.clipboard.writeText(formula).then(()=>toast('Sheet formula copied ✓')).catch(()=>prompt('Copy formula:',formula));
}

function copyText(text, msg) {
  navigator.clipboard.writeText(text).then(()=>toast(msg||'Copied!')).catch(()=>prompt('Copy:',text));
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2000);
}

  else {
    document.getElementById('profile-page').style.display = 'none';
    document.getElementById('index-page').style.display = 'block';
  }
});
